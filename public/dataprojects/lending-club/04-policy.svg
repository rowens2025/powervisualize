  </text>

  <rect x="56" y="128" width="848" height="352" rx="18" ry="18" fill="#020617" stroke="#1f2937"/>

  <!-- profit impact curve -->
  <path d="M96 432 C 192 232 416 176 640 220 C 752 244 824 296 872 332"
