<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg05" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg05)"/>
  <rect x="40" y="40" width="880" height="64" rx="16" ry="16" fill="#020617" stroke="#1f2937"/>
  <text x="64" y="78" fill="#e5e7eb" font-family="system-ui, -apple-system, BlinkMacSystemFont" font-size="20" font-weight="600">
    Try It — Loan Input
  </text>
  <text x="64" y="100" fill="#9ca3af" font-family="system-ui" font-size="12">
    Enter a hypothetical loan and see its PD, risk decile, and approve/decline decision
  </text>

  <!-- left form -->
  <rect x="56" y="128" width="408" height="352" rx="18" ry="18" fill="#020617" stroke="#1f2937"/>
  <g transform="translate(80 160)" fill="none" stroke="#1f2937">
    <rect x="0" y="0" width="296" height="32" rx="8" ry="8"/>
    <rect x="0" y="52" width="296" height="32" rx="8" ry="8"/>
    <rect x="0" y="104" width="296" height="32" rx="8" ry="8"/>
    <rect x="0" y="156" width="296" height="32" rx="8" ry="8"/>
    <rect x="0" y="208" width="296" height="32" rx="8" ry="8"/>
  </g>
  <rect x="80" y="372" width="140" height="40" rx="999" ry="999" fill="#0369a1"/>
  <text x="104" y="398" fill="#e5e7eb" font-family="system-ui" font-size="14" font-weight="600">
    Score Loan
  </text>

  <!-- right output -->
  <rect x="456" y="128" width="448" height="352" rx="18" ry="18" fill="#020617" stroke="#1f2937"/>
  <text x="480" y="168" fill="#e5e7eb" font-family="system-ui" font-size="16" font-weight="600">
    PD: 7.3% • Risk decile: 8 / 10
  </text>
  <text x="480" y="194" fill="#22c55e" font-family="system-ui" font-size="14" font-weight="600">
    Decision: DECLINE under current policy
  </text>
  <text x="480" y="226" fill="#9ca3af" font-family="system-ui" font-size="12">
    Explanation: PD sits in the top 30% of risk, above the optimal cutoff where profit and loss-avoidance peak.
  </text>
</svg>

