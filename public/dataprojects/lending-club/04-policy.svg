  <!-- baseline axis -->
  <line x1="80" y1="432" x2="888" y2="432" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>

  <text x="96" y="452" fill="#64748b" font-family="system-ui" font-size="11">
